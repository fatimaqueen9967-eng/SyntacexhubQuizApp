<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Quiz App</h1>

    <!-- QUIZ BOX -->
    <div class="box" id="quiz-box">

        <!-- Progress Bar -->
        <div id="progress-bar-wrap">
            <div id="progress-bar"></div>
        </div>

        <!-- Counter + Timer row -->
        <div id="meta-row">
            <span id="q-counter">Question 1 / 14</span>
            <span id="timer">⏱ 15s</span>
        </div>

        <!-- Question -->
        <div class="question">
            <p id="question-text">Loading...</p>
        </div>

        <!-- Options -->
        <div class="options" id="options-container"></div>

        <!-- Feedback message -->
        <p id="feedback"></p>

        <!-- Next Button -->
        <button id="nextBtn" style="display:none;">Next →</button>

    </div>

    <!-- RESULT BOX -->
    <div class="box" id="result-box" style="display:none; text-align:center;">
        <div id="result-emoji" style="font-size: 3rem; margin-bottom: 10px;"></div>
        <h2 id="result-title"></h2>
        <p id="result-score" style="font-size: 1.4rem; font-weight: bold; margin: 10px 0;"></p>
        <p id="result-msg" style="color: #555; margin-bottom: 16px;"></p>
        <div id="result-stats">
            <span id="stat-correct"></span>
            <span id="stat-wrong"></span>
        </div>
        <button id="restartBtn">🔄 Restart Quiz</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
